<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UE Học Tập — Unreal Engine 5.6</title>
  <meta name="description" content="Hệ thống học và luyện tập Unreal Engine 5.6 nội bộ." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230b0e14' stroke='%234ea1ff' stroke-width='4'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%234ea1ff' font-family='sans-serif' font-weight='bold'%3EUE%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-theme="dark">
  <div id="app">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-logo">UE</div>
        <div class="brand-text">
          <strong>UE Học Tập</strong>
          <span>Unreal Engine 5.6</span>
        </div>
      </div>

      <nav class="nav-primary" id="navPrimary"></nav>

      <div class="nav-modules-head">
        <span>Bài học theo nhóm</span>
        <button id="collapseAll" class="mini-btn" title="Thu gọn tất cả">⇕</button>
      </div>
      <nav class="nav-modules" id="navModules"></nav>

      <div class="sidebar-foot">
        <div class="mini-progress">
          <div class="mini-progress-bar"><span id="sideProgressFill"></span></div>
          <small id="sideProgressText">0%</small>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div id="main">
      <header id="topbar">
        <button id="menuToggle" class="icon-btn" title="Menu">☰</button>
        <div class="search-wrap">
          <input id="searchInput" type="text" placeholder="Tìm bài học, khái niệm, phím tắt…  (Ctrl + K)" autocomplete="off" />
          <div id="searchResults" class="search-results"></div>
        </div>
        <div class="topbar-right">
          <div class="streak-pill" id="streakPill" title="Chuỗi ngày học liên tục">🔥 <span id="streakCount">0</span></div>
          <div class="xp-pill" id="xpPill" title="Điểm kinh nghiệm">
            <span class="xp-level" id="xpLevel">Lv.1</span>
            <span class="xp-num" id="xpNum">0 XP</span>
          </div>
          <button id="themeToggle" class="icon-btn" title="Đổi giao diện sáng/tối">◑</button>
        </div>
      </header>

      <main id="view"></main>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="assets/data/content.js"></script>
  <script src="assets/data/learning.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
