name: Deploy web học UE lên GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Deploy tĩnh: dùng thẳng assets/data/content.js đã commit sẵn.
# Tài liệu Markdown gốc KHÔNG nằm trong repo, nên không build lại ở đây —
# muốn đổi nội dung thì chạy `npm run build` ở máy rồi commit content.js.
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gom file tĩnh vào _site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
